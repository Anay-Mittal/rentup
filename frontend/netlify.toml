[build]
  base = "frontend"
  publish = "build"
  command = "npm run build"

# SPA fallback — every unknown path serves index.html so React Router handles it
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets aggressively (hashed filenames)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
